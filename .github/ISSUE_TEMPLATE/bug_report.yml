name: Bug Report
description: Report a bug in the SportPulse API
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug. Please fill in all required fields."

  - type: input
    id: endpoint
    attributes:
      label: Affected endpoint
      placeholder: "GET /api/articles"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Call endpoint with...
        2. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant Pino log output (JSON format)
      render: json

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "v1.0.0"
